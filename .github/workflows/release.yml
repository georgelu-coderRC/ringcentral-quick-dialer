name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Write production env
        run: |
          echo "VITE_RC_CLIENT_ID=${{ secrets.VITE_RC_CLIENT_ID }}" > .env.production

      - name: Build
        run: npm run build

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v$(node -p "require('./package.json').version")-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Package zip
        run: |
          cd dist
          # Versioned zip (archive of this specific release)
          zip -r "../RingCentral-Quick-Dialer-${{ steps.ver.outputs.version }}.zip" . -x "*.DS_Store"
          # Versionless zip — stable filename so external links keep working
          # across releases (e.g. for the RingCentral App Gallery)
          zip -r "../RingCentral-Quick-Dialer.zip" . -x "*.DS_Store"
          cd ..
          ls -lh *.zip

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: RingCentral-Quick-Dialer-*.zip
          if-no-files-found: error

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: RingCentral Quick Dialer ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: RingCentral-Quick-Dialer-*.zip
