<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Dialing…</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 40px 30px;
        text-align: center;
        color: #1a1a1a;
        background: #fafafa;
      }
      h2 { color: #0073ae; margin: 0 0 12px; }
      p { color: #666; font-size: 13px; line-height: 1.5; max-width: 460px; margin: 0 auto 16px; }
      .tip { background: #fff8e1; border: 1px solid #ffe69c; padding: 10px 14px; border-radius: 6px; color: #664d03; }
      .actions { margin-top: 16px; display: flex; gap: 8px; justify-content: center; }
      .actions a, .actions button {
        font: inherit; padding: 10px 16px; border-radius: 6px; border: none;
        background: #0073ae; color: #fff; cursor: pointer; text-decoration: none;
        display: inline-block;
      }
      .actions a:hover, .actions button:hover { background: #005f91; }
      .actions .secondary { background: #eee; color: #333; }
    </style>
  </head>
  <body>
    <h2 id="msg">Dialing…</h2>
    <p>Your RingEX desktop app should be opening now.</p>
    <p class="tip">
      First time? In the Chrome prompt that appears, check
      <b>"Always allow this site to open links of this type"</b>
      before clicking <b>Open RingCentral</b>. After that, future dials are silent.
    </p>
    <div class="actions">
      <a id="dialLink" href="#">Dial now</a>
      <button id="closeBtn" class="secondary">Close</button>
    </div>
    <script src="dial.js"></script>
  </body>
</html>
